name: Deploy PencaKP to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # PHP Setup (working on the Laravel app in `src/`)
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, curl, zip, gd, pdo, pdo_mysql
        tools: composer

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Composer Dependencies
      working-directory: src
      run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

    - name: Build front-end assets
      working-directory: src
      run: |
        if [ -f package.json ]; then
          npm ci
          npm run build
        fi

    - name: Generate .env file for production (in src)
      working-directory: src
      run: |
        echo "APP_NAME=PencaKP" > .env
        echo "APP_ENV=production" >> .env
        echo "APP_KEY=${{ secrets.PROD_APP_KEY }}" >> .env
        echo "APP_DEBUG=false" >> .env
        echo "APP_URL=${{ secrets.PROD_APP_URL }}" >> .env
        echo "" >> .env
        echo "LOG_CHANNEL=stack" >> .env
        echo "LOG_DEPRECATIONS_CHANNEL=null" >> .env
        echo "LOG_LEVEL=error" >> .env
        echo "" >> .env
        echo "DB_CONNECTION=mysql" >> .env
        echo "DB_HOST=${{ secrets.PROD_DB_HOST }}" >> .env
        echo "DB_PORT=3306" >> .env
        echo "DB_DATABASE=${{ secrets.PROD_DB_DATABASE }}" >> .env
        echo "DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env
        echo "" >> .env
        echo "BROADCAST_DRIVER=log" >> .env
        echo "CACHE_DRIVER=file" >> .env
        echo "FILESYSTEM_DISK=local" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env
        echo "SESSION_DRIVER=file" >> .env
        echo "SESSION_LIFETIME=120" >> .env

    - name: Prepare release directory (src/release)
      working-directory: src
      run: |
        rm -rf release || true
        mkdir -p release
        rsync -a --delete --exclude='release' --exclude='.git' --exclude='.github' --exclude='tests' --exclude='node_modules' --exclude='.env*' --exclude='storage/logs/*' ./ release/
        # copy dotfiles that rsync might skip
        cp -f .htaccess release/ 2>/dev/null || true
        cp -f .env release/.env || true

    - name: Deploy to FTP server (upload release/ to /htdocs)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        local-dir: src/release/
        server-dir: /htdocs/
        dangerous-clean-slate: false
        exclude: |
          **/.git*
          **/.git*/**
        timeout: 600000
