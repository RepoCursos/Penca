name: Deploy PencaKP to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node Dependencies
      run: |
        if [ -f package.json ]; then
          npm ci || npm install
        fi

    - name: Build assets with Vite
      run: |
        if [ -f package.json ]; then
          npm run build
        fi

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, curl, zip, gd, iconv, pdo, pdo_mysql
        tools: composer

    - name: Install Composer Dependencies
      run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

    - name: Generate .env file for production
      run: |
        echo "APP_NAME=PencaKP" > .env
        echo "APP_ENV=production" >> .env
        echo "APP_KEY=${{ secrets.PROD_APP_KEY }}" >> .env
        echo "APP_DEBUG=false" >> .env
        echo "APP_URL=${{ secrets.PROD_APP_URL }}" >> .env
        echo "" >> .env
        echo "LOG_CHANNEL=stack" >> .env
        echo "LOG_DEPRECATIONS_CHANNEL=null" >> .env
        echo "LOG_LEVEL=error" >> .env
        echo "" >> .env
        echo "DB_CONNECTION=mysql" >> .env
        echo "DB_HOST=${{ secrets.PROD_DB_HOST }}" >> .env
        echo "DB_PORT=3306" >> .env
        echo "DB_DATABASE=${{ secrets.PROD_DB_DATABASE }}" >> .env
        echo "DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}" >> .env
        echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" >> .env
        echo "" >> .env
        echo "BROADCAST_DRIVER=log" >> .env
        echo "CACHE_DRIVER=file" >> .env
        echo "FILESYSTEM_DISK=local" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env
        echo "SESSION_DRIVER=file" >> .env
        echo "SESSION_LIFETIME=120" >> .env
        echo "" >> .env
        echo "MAIL_MAILER=smtp" >> .env
        echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
        echo "MAIL_PORT=587" >> .env
        echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
        echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
        echo "MAIL_ENCRYPTION=tls" >> .env
        echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> .env
        echo "MAIL_FROM_NAME='PencaKP'" >> .env

    - name: Prepare release directory
      run: |
        rm -rf release || true
        mkdir -p release
        rsync -a --delete --exclude='release' --exclude='.git' --exclude='.github' --exclude='tests' --exclude='node_modules' --exclude='.env*' --exclude='storage/logs/*' ./ release/
        # copy public .htaccess if present
        cp -f public/.htaccess release/.htaccess 2>/dev/null || true
        cp -f .env release/.env || true
        # if public/index.php exists, move its contents to release root and fix paths
        if [ -f release/public/index.php ]; then
          cp -f release/public/index.php release/index.php
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/vendor/autoload.php'|g" release/index.php || true
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/bootstrap/app.php'|g" release/index.php || true
        fi
        if [ -d release/public ]; then
          cp -r release/public/* release/ || true
          rm -rf release/public || true
        fi

    - name: Cache Laravel configurations
      run: |
        if php -v >/dev/null 2>&1; then
          (cd release && php artisan config:cache) || true
          (cd release && php artisan route:cache) || true
          (cd release && php artisan view:cache) || true
        fi

    - name: Set permissions
      run: |
        chmod -R 775 release/storage release/bootstrap/cache || true
        find release/storage -type f -exec chmod 644 {} \; || true
        find release/storage -type d -exec chmod 775 {} \; || true

    - name: Clean unnecessary files
      run: |
        rm -rf release/node_modules
        rm -rf release/.git
        rm -rf release/.github
        rm -rf release/tests
        rm -f release/.gitignore
        rm -f release/.gitattributes
        rm -f release/README.md
        rm -f release/package*.json
        rm -f release/vite.config.js
        rm -f release/tailwind.config.js
        rm -f release/postcss.config.js
        rm -f release/phpunit.xml
        rm -f release/.editorconfig
        rm -f release/.env.example
        rm -rf release/resources/js
        rm -rf release/resources/css
        rm -rf release/resources/sass
        rm -rf release/bootstrap/cache/* || true

    - name: Deploy to FTP server (upload release/ to /htdocs)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        local-dir: release/
        server-dir: /htdocs/
        dangerous-clean-slate: false
        exclude: |
          **/.git*
          **/.git*/**
          **/deploy/**

        timeout: 600000
